{% extends 'base.html' %}

{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center">Ro'yxatdan o'tish</h3>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Hisob yaratish</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <p>Akkountingiz bormi? <a href="{% url 'login' %}">Kirish</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
