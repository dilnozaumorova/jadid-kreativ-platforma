{% extends 'base.html' %}

{% block title %}Resurslar{% endblock %}

{% block content %}
<div class="container-fluid mt-5">
    <h1 class="display-5 fw-bold text-dark mb-5">🔗 Resurslar (ARM)</h1>

    <div class="row g-3">
        {% for resource in resources %}
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100 p-2">
                <div class="card-body d-flex align-items-center">
                    <div class="bg-success bg-opacity-10 rounded-circle p-3 me-3 text-success">
                        <i class="bi bi-link-45deg fs-4"></i>
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <h6 class="mb-1 fw-bold text-truncate">{{ resource.resource_name }}</h6>
                        <a href="{{ resource.resource_link }}" target="_blank" class="text-muted small text-truncate d-block">
                            {{ resource.resource_link }}
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <h3 class="text-muted">Resurslar mavjud emas.</h3>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
