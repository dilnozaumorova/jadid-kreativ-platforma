{% extends 'base.html' %}

{% block title %}Topshiriqni topshirish{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4 p-4">
                <div class="card-body">
                    <h2 class="fw-bold mb-4 text-primary">
                        <i class="bi bi-cloud-upload me-2"></i> Topshiriqni topshirish
                    </h2>
                    <h5 class="text-dark mb-4">{{ task.task_name }}</h5>
                    
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Faylni tanlang</label>
                            {{ form.file }}
                            <div class="form-text text-muted">Ishingizni fayl shaklida yuklang.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Izoh (ixtiyoriy)</label>
                            {{ form.comment }}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill">
                                Topshiriqni yuborish
                            </button>
                            <a href="{% url 'moduls:task_list' %}" class="btn btn-light rounded-pill">
                                Bekor qilish
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
