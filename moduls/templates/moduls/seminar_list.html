{% extends 'base.html' %}

{% block title %}Seminarlar{% endblock %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-dark">🎓 Seminar Mavzulari</h1>
    </div>

    <div class="row g-4">
        {% for seminar in seminars %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0 rounded-4 xiva-card">
                <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="badge bg-primary rounded-pill px-3 py-2">
                            <i class="bi bi-journal-bookmark me-1"></i> Mavzu
                        </span>
                    </div>
                    
                    <h5 class="card-title fw-bold text-dark mb-3">{{ seminar.title }}</h5>
                    <p class="card-text text-muted flex-grow-1">
                        {{ seminar.description|truncatewords:20 }}
                    </p>
                    
                    <div class="mt-4 pt-3 border-top d-flex gap-2">
                        <a href="{% url 'moduls:seminar_detail' seminar.id %}" class="btn btn-primary rounded-pill w-100">
                            Kirish <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <h3 class="text-muted">Hozircha seminar mavzulari mavjud emas.</h3>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
