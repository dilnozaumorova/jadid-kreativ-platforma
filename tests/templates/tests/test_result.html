{% extends 'base.html' %}

{% block title %}Test Natijasi{% endblock %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-lg border-0 rounded-4 text-center p-5">
            <div class="mb-4">
                {% if result.score >= 3 %}
                    <i class="bi bi-patch-check-fill text-success" style="font-size: 5rem;"></i>
                    <h2 class="mt-3 fw-bold text-success">Tabriklaymiz!</h2>
                {% else %}
                    <i class="bi bi-exclamation-circle-fill text-warning" style="font-size: 5rem;"></i>
                    <h2 class="mt-3 fw-bold text-warning">Yaxshiroq o'qishingiz kerak</h2>
                {% endif %}
            </div>

            <h4 class="text-muted mb-4">Sizning natijangiz:</h4>
            <div class="display-1 fw-bold mb-4">
                {{ result.score }} <span class="fs-2 text-muted">/ {{ result.total_questions }}</span>
            </div>

            <div class="progress mb-5" style="height: 10px;">
                <div class="progress-bar {% if result.score >= 3 %}bg-success{% else %}bg-warning{% endif %}" 
                     role="progressbar" 
                     style="width: {% widthratio result.score result.total_questions 100 %}%" 
                     aria-valuenow="{{ result.score }}" 
                     aria-valuemin="0" 
                     aria-valuemax="{{ result.total_questions }}"></div>
            </div>

            <div class="d-grid gap-2">
                <a href="{% url 'moduls:lecture_list' %}" class="btn btn-primary btn-lg rounded-pill">
                    Maruzalarga qaytish
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
